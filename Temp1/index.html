<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title></title>

    <link href="Lib/bootstrap/dist/css/bootstrap.css" rel="stylesheet" />
    <link href="Lib/styles/headers.css" rel="stylesheet" />
    <script src="lib/debugHelper.js"></script>
    <link href="Lib/styles/index.css" rel="stylesheet" />
    <!--suppress no favicon-->
    <link rel="shortcut icon" href="#">


</head>
<body>
    <div class="nine mt-3">
        <h1>bootstrap <span> input group</span></h1>
    </div>

    <main>

        <div class="container">
            <div class="col-3">
                <div class="input-group mb-3">
                    <span class="input-group-text" id="full_name">Name</span>
                    <input type="text"
                           class="form-control"
                           id="full_name_input"
                           aria-label="Compact whitespaces input"
                           aria-describedby="inputGroup-sizing-default"
                           value="Karen Smith">
                </div>
            </div>

        </div>

    </main>

    <script>

        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("full_name").addEventListener("click", function () {
                document.getElementById("full_name_input").focus();
            });
        });
    </script>

</body>
</html>
